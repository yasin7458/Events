<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: lightgray;
            font-size: 20px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        }

        .box {
            padding: 40px 50px;
            background: black;
            color: white;
        }
    </style>

</head>

<body>
<div class="box" onmouseup="stop()">
    Release Mouse
</div>

<script>
function stop() {
    alert("Mouse Released");
}
</script> 
</body>

</html>
