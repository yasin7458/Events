<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: lightgray;
        font-size: 20px;
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }

    #card {
        width: 200px;
        padding: 20px;
        background: black;
        color: aliceblue;
        transition: 0.3s;
        text-align: center;
    }
</style>

<body>
    <div id="card" onmouseenter="enterCard()" onmouseleave="leaveCard()">
        Yashin
    </div>

    <script>
        function enterCard() {
            alert("Mouse Enter");
        }

        function leaveCard() {
            alert("Mouse Leave");
        }
    </script>
</body>

</html>
