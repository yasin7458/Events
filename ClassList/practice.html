<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: gray;
        }

        .box {
            padding: 13px 20px;
            background-color: black;
            color: white;
            cursor: pointer;
            border: none;
            border-radius: 15px;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            font-weight: bold;
            font-size: 15px;
            transition: all .5s;
        }

        .text {
            width: 300px;
            height: 300px;
            background: darkred;
        }

        .qw {
            background-color: rgb(250, 105, 105);
        }
    </style>
</head>

<body>
    <div class="text"></div>
    <button class="box" onclick="">Click to check Whose Event is opend</button>
</body>

<script>
    let btn = document.querySelector(".box");
    let box = document.querySelector(".text");

    btn.addEventListener("click", () => {
        if (box.classList.toggle("qw")) {
            btn.innerHTML = "ON"
            document.body.style.background = "black"
        }
        else{
            btn.innerHTML = "OFF"
            document.body.style.background = "white"
        }
    });
</script>

</html>
