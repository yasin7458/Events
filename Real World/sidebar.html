<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Side-Bar</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            background: lightgray;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100vh;
            background: #222;
            transition: .5s;
            padding-top: 70px;
        }

        /* Open Sidebar */

        .sidebar.open {
            left: 0;
        }

        /* Sidebar Links */

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 18px 25px;
            transition: .3s;
        }

        .sidebar a:hover {
            background: #444;
        }

        .sidebar h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
        }

        .menu-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 18px;
            font-size: 25px;
            cursor: pointer;
            border: none;
            background: black;
            color: white;
            border-radius: 8px;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 35px;
            height: 35px;
            border: none;
            background: none;
            color: white;
            font-size: 30px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <button class="menu-btn">☰</button>

    <div class="sidebar">

        <button class="close-btn">&times;</button>

        <h1>Menu</h1>

        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Blog</a>
        <a href="#">Contact</a>

    </div>

    <script>
        let btn = document.querySelector(".menu-btn");
        let sidebar = document.querySelector(".sidebar");
        let closeBtn = document.querySelector(".close-btn");

        btn.addEventListener("click", () => {
            sidebar.classList.toggle("open");
        });

        closeBtn.addEventListener("click", () => {
            sidebar.classList.remove("open");
        });

        document.addEventListener("click", (event) => {

            if (
                !sidebar.contains(event.target) &&
                !btn.contains(event.target)
            ) {
                sidebar.classList.remove("open");
            }

        });
    </script>
</body>

</html>
